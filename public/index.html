<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    h1 { color: #2d3748; margin-bottom: 30px; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
    input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
    button { width: 100%; padding: 12px; background: #4299e1; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #3182ce; }
    .result { margin-top: 20px; padding: 15px; background: #ebf8ff; border-radius: 8px; display: none; }
    .result a { color: #2b6cb0; word-break: break-all; }
    .history { margin-top: 30px; width: 100%; max-width: 600px; }
    .history h2 { margin-bottom: 15px; color: #2d3748; }
    .url-item { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .url-item a { color: #4299e1; }
    .clicks { font-size: 12px; color: #718096; margin-top: 5px; }
  </style>
</head>
<body>
  <h1>🔗 URL Shortener</h1>
  <div class="card">
    <input type="text" id="urlInput" placeholder="Paste your long URL here...">
    <button onclick="shortenUrl()">Shorten URL</button>
    <div class="result" id="result">
      <p>Short URL: <a id="shortUrl" href="#" target="_blank"></a></p>
    </div>
  </div>
  <div class="history">
    <h2>Recent URLs</h2>
    <div id="urlList"></div>
  </div>
  <script>
    async function shortenUrl() {
      const originalUrl = document.getElementById('urlInput').value;
      if (!originalUrl) return alert('Please enter a URL');
      const res = await fetch('/api/url/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ originalUrl })
      });
      const data = await res.json();
      const shortUrl = `${window.location.origin}/${data.shortCode}`;
      document.getElementById('shortUrl').href = shortUrl;
      document.getElementById('shortUrl').textContent = shortUrl;
      document.getElementById('result').style.display = 'block';
      loadUrls();
    }
    async function loadUrls() {
      const res = await fetch('/api/url');
      const urls = await res.json();
      const list = document.getElementById('urlList');
      list.innerHTML = urls.map(u => `
        <div class="url-item">
          <a href="/${u.shortCode}" target="_blank">${window.location.origin}/${u.shortCode}</a>
          <p class="clicks">Original: ${u.originalUrl.substring(0, 50)}...</p>
          <p class="clicks">Clicks: ${u.clicks}</p>
        </div>
      `).join('');
    }
    loadUrls();
  </script>
</body>
</html>
